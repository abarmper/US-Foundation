# ABLATION ANCHOR -- full upgraded recipe, fold 0, Phase-1 ep20 checkpoint.
# This is the reference point for the abl_ep20_* leave-one-out family: each of the
# other abl_ep20_* configs is THIS recipe with exactly ONE knob reverted to its
# baseline value, so (anchor - ablation) isolates that knob's effect on fold-0 val.
# Run this too (once ep20 exists) so the ablations have a same-checkpoint anchor;
# the existing phase2_upgraded_fold0 used ep10, so it is NOT a clean reference here.
run_name: abl_ep20_upgraded
phase: phase2
seed: 42
phase1_weights: runs/phase1_multicrop/checkpoints/dinov2_adapted_ep20.pth

model:
  backbone:
    name: dinov2_vitl14_reg
    unfreeze_last_n_blocks: 4
  neck:
    branch_width: [128, 96, 64]
    dropout_p: 0.3
    input_mode: multilevel
    feature_layers: [5, 11, 17, 23]
    shared_head: false
  heatmap_size: 148

data:
  data_root: data/data/train_data
  kfold_dir: splits/kfold_v1
  fold: 0
  batch_size: 64
  num_workers: 8
  canvas: 518
  sample_temp: 0.5

optim:
  lr: 2.0e-4
  encoder_lr_mult: 0.1
  llrd_decay: 0.75
  amp_dtype: bf16
  weight_decay: 1.0e-2
  epochs: 150
  warmup_epochs: 15
  softargmax_temp: 10.0
  loss_space: original
  dsnt_lambda: 0.1
  dsnt_type: js
  dsnt_sigma: 1.0
  early_stop_patience: 40
  select_metric: challenge_blend
