# Phase 2 -- all method upgrades enabled (see METHOD_CHANGES.md).
#  * multi-level DINOv2 features into the neck (input_mode: multilevel)
#  * register backbone (requires Phase 1 re-run on dinov2_vitl14_reg)
#  * layer-wise LR decay (llrd_decay: 0.75)
#  * DSNT variance/JS regularization (dsnt_lambda: 0.1)
run_name: phase2_upgraded
phase: phase2
seed: 42
phase1_weights: pretrained/dinov2_reg_adapted_ep20.pth

model:
  backbone:
    name: dinov2_vitl14_reg      # register variant -> cleaner dense features
    unfreeze_last_n_blocks: 4
  neck:
    branch_width: [128, 96, 64]
    dropout_p: 0.3
    input_mode: multilevel       # DPT/ViTPose-style multi-depth reassemble
    feature_layers: [5, 11, 17, 23]
    shared_head: false
  heatmap_size: 148             # match the neck output (finer soft-argmax)

data:
  data_root: data/data/train_data
  split_file: splits/train_val_split_keys.json
  batch_size: 64               # A100-80GB has headroom (baseline used ~29 GB)
  num_workers: 8
  canvas: 518
  sample_temp: 0.5             # sqrt task sampling (small cardiac tasks not overfit)

optim:
  lr: 2.0e-4                   # sqrt-scaled from 1e-4 @ bs16
  encoder_lr_mult: 0.1
  llrd_decay: 0.75             # layer-wise LR decay
  amp_dtype: bf16              # A100
  weight_decay: 1.0e-2
  epochs: 150                  # cosine anneal completes before early-stop
  warmup_epochs: 15
  softargmax_temp: 10.0
  loss_space: original         # align loss with the original-px metric
  dsnt_lambda: 0.1             # DSNT regularization (keeps heatmaps tight)
  dsnt_type: js
  dsnt_sigma: 1.0
  early_stop_patience: 40
  select_metric: challenge_blend
