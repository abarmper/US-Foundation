# Experiment: median (instead of mean) aggregation across folds x TTA views.
# = predict_ensemble + predict.reduce=median. Run with: gubiometry predict --config <this>
run_name: exp_median_ensemble
phase: predict

data:
  data_root: data/data/train_data
  split_file: splits/train_val_split_keys.json

predict:
  member_run_dirs:
    - runs/phase2_upgraded_fold0
    - runs/phase2_upgraded_fold1
    - runs/phase2_upgraded_fold2
    - runs/phase2_upgraded_fold3
    - runs/phase2_upgraded_fold4
  checkpoint_name: best_teacher_model.pth
  tta_canvases: [490, 518, 546]
  tta_intensity: true
  average_space: coord
  reduce: median            # <-- the experiment (mean | median)
  out_json: submission_median.json
  zip_output: true
