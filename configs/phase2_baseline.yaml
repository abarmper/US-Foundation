# Phase 2 -- legacy-recipe reference (pins the pre-best-practice defaults).
# input_mode=single + heatmap 128 + llrd 1.0 + sample_temp 0 + loss_space canvas +
# dsnt 0 + fp16. (Still gets the strict code fixes: weight-decay exclusion + bf16
# availability.) Use configs/phase2_upgraded.yaml for the recommended recipe.
run_name: phase2_baseline
phase: phase2
seed: 42
phase1_weights: pretrained/dinov2_adapted_ep20.pth

model:
  backbone:
    name: dinov2_vitl14
    unfreeze_last_n_blocks: 4
  neck:
    branch_width: [128, 96, 64]
    dropout_p: 0.3
    input_mode: single
    shared_head: false
  heatmap_size: 128

data:
  data_root: data/data/train_data
  split_file: splits/train_val_split_keys.json
  batch_size: 16
  num_workers: 8
  canvas: 518
  sample_temp: 0.0            # legacy: fully balanced

optim:
  lr: 1.0e-4
  encoder_lr_mult: 0.1
  llrd_decay: 1.0
  weight_decay: 1.0e-2
  epochs: 500
  warmup_epochs: 15
  softargmax_temp: 10.0
  dsnt_lambda: 0.0
  loss_space: canvas          # legacy: 518-canvas px
  amp_dtype: fp16             # legacy
  early_stop_patience: 30
  select_metric: challenge_blend
